<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f2;
    --muted: #6b6b78;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --accent-dim: rgba(200,240,74,0.12);
    --accent2-dim: rgba(74,240,200,0.12);
    --radius: 12px;
    --font: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 28px 24px 40px;
    max-width: 780px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .header-title span { color: var(--accent); }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 6px;
  }

  /* Stat cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.6;
  }
  .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #f04ac8, transparent); }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ctrl-label {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    width: 68px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  input[type=range] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(200,240,74,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 14px rgba(200,240,74,0.6);
  }
  input[type=number] {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 500;
    width: 60px;
    text-align: center;
    padding: 5px 8px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .num-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: var(--surface2);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .num-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,240,74,0.1);
  }
  .num-wrap input[type=number] {
    border: none;
    border-radius: 0;
    background: transparent;
    width: 46px;
    padding: 5px 4px;
    text-align: center;
    box-shadow: none;
  }
  .num-wrap input[type=number]:focus { box-shadow: none; }
  .spin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 100%;
    min-height: 28px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
    padding: 0;
    user-select: none;
    flex-shrink: 0;
  }
  .spin-btn:hover { color: var(--accent); background: rgba(200,240,74,0.07); }
  .spin-btn:active { color: var(--accent); background: rgba(200,240,74,0.14); }
  .spin-sep { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }
  input[type=number]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,240,74,0.1);
  }

  /* Tabs */
  .tab-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tab-btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.01em;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--border2); }
  .tab-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .tab-btn.active.green {
    background: var(--accent2-dim);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .toggle-label {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    user-select: none;
    cursor: pointer;
  }
  .toggle {
    width: 38px; height: 21px;
    background: var(--surface2);
    border-radius: 99px;
    border: 1px solid var(--border2);
    position: relative;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .toggle.on {
    background: rgba(74,240,200,0.2);
    border-color: var(--accent2);
    box-shadow: 0 0 10px rgba(74,240,200,0.2);
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on::after {
    transform: translateX(17px);
    background: var(--accent2);
  }

  /* Chart panel */
  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
  }
  .chart-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  #xpChart { display: block; }

  /* Legend dots */
  .legend { display: flex; gap: 14px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Table */
  .table-wrap {
    max-height: 300px;
    overflow-y: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .xp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .xp-table th {
    text-align: left;
    padding: 10px 14px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 1;
  }
  .xp-table td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
  }
  .xp-table tr:last-child td { border-bottom: none; }
  .xp-table tr:hover td { background: var(--surface2); }
  .xp-table td:first-child { color: var(--accent); font-weight: 500; }

  @media (max-width: 520px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stat-card:nth-child(3) { grid-column: 1 / -1; }
    .stat-val { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">TDX <span>XP Visualizer</span></div>
    <div class="header-sub">Level progression calculator</div>
  </div>
</div>

<div class="stats-row" id="statCards"></div>

<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">Min lvl</span>
    <input type="range" id="minSlider" min="50" max="999" value="50">
    <div class="num-wrap">
      <button class="spin-btn" onclick="nudge('minNum','minSlider',-1)">−</button>
      <div class="spin-sep"></div>
      <input type="number" id="minNum" min="50" max="999" value="50">
      <div class="spin-sep"></div>
      <button class="spin-btn" onclick="nudge('minNum','minSlider',1)">+</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Max lvl</span>
    <input type="range" id="maxSlider" min="50" max="999" value="200">
    <div class="num-wrap">
      <button class="spin-btn" onclick="nudge('maxNum','maxSlider',-1)">−</button>
      <div class="spin-sep"></div>
      <input type="number" id="maxNum" min="50" max="999" value="200">
      <div class="spin-sep"></div>
      <button class="spin-btn" onclick="nudge('maxNum','maxSlider',1)">+</button>
    </div>
  </div>
</div>

<div class="tab-row">
  <button class="tab-btn active" id="tabChart" onclick="showTab('chart')">Chart</button>
  <button class="tab-btn green" id="tabTable" onclick="showTab('table')">XP Table</button>
</div>

<div id="panelChart">
  <div class="chart-panel">
    <div class="chart-top">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#c8f04a"></div>XP / level</div>
        <div class="legend-item" id="cumLegend"><div class="legend-dot" style="background:#4af0c8"></div>Cumulative</div>
      </div>
      <div class="toggle-row" style="margin:0">
        <div class="toggle on" id="cumToggle" onclick="toggleCumulative()"></div>
        <label class="toggle-label" onclick="toggleCumulative()">Cumulative XP</label>
      </div>
    </div>
    <div style="position:relative; height:280px;">
      <canvas id="xpChart"></canvas>
    </div>
  </div>
</div>

<div id="panelTable" style="display:none; margin-top:0;">
  <div class="table-wrap">
    <table class="xp-table">
      <thead><tr>
        <th>Level</th>
        <th>XP for next Lvl</th>
        <th>Cumulative XP</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let myChart = null;
let activeTab = 'chart';
let showCumulative = true;

function xp(n) {
  return 10000 + Math.ceil(Math.pow((n - 49) / 0.03, 1.7) * 0.1);
}
function fmt(n) { return n.toLocaleString(); }

function getData() {
  const mn = parseInt(document.getElementById('minNum').value);
  const mx = parseInt(document.getElementById('maxNum').value);
  const labels = [], per = [], cum = [];
  let running = 0;
  for (let i = mn; i <= mx; i++) {
    const v = xp(i);
    labels.push(i);
    per.push(v);
    cum.push(running); // cumulative = XP needed to *reach* this level, not complete it
    if (i < mx) running += v;
  }
  return { labels, per, cum, mn, mx };
}

function updateStats(data) {
  const { per, cum, mn, mx } = data;
  const minXP = per[0], maxXP = per[per.length - 1], totalXP = cum[cum.length - 1];
  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">XP at lvl ${mn}</div>
      <div class="stat-val">${fmt(minXP)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">XP at lvl ${mx}</div>
      <div class="stat-val">${fmt(maxXP)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total ${mn}→${mx}</div>
      <div class="stat-val">${fmt(totalXP)}</div>
    </div>
  `;
}

function updateChart(data) {
  const { labels, per, cum } = data;
  if (myChart) { myChart.destroy(); myChart = null; }

  const datasets = [
    {
      label: 'XP per level',
      data: per,
      borderColor: '#c8f04a',
      backgroundColor: 'rgba(200,240,74,0.10)',
      borderWidth: 2,
      pointRadius: labels.length > 80 ? 0 : 2.5,
      pointBackgroundColor: '#c8f04a',
      fill: true,
      tension: 0.35,
      yAxisID: 'y',
      order: 2
    }
  ];

  if (showCumulative) {
    datasets.push({
      label: 'Cumulative XP',
      data: cum,
      borderColor: '#4af0c8',
      backgroundColor: 'rgba(74,240,200,0.06)',
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      tension: 0.35,
      yAxisID: 'y2',
      order: 1
    });
  }

  const gridColor = 'rgba(255,255,255,0.05)';
  const tickColor = '#6b6b78';

  myChart = new Chart(document.getElementById('xpChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c21',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#6b6b78',
          bodyColor: '#f0f0f2',
          titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
          padding: 10,
          callbacks: {
            title: items => `Level ${items[0].label}`,
            label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)} XP`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: tickColor, font: { size: 11, family: "'JetBrains Mono', monospace" }, maxTicksLimit: 10, autoSkip: true },
          grid: { color: gridColor },
          border: { color: 'rgba(255,255,255,0.08)' }
        },
        y: {
          position: 'left',
          ticks: {
            color: '#c8f04a',
            font: { size: 10, family: "'JetBrains Mono', monospace" },
            callback: v => v >= 1e9 ? (v/1e9).toFixed(1)+'B' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v
          },
          grid: { color: gridColor },
          border: { color: 'rgba(255,255,255,0.08)', dash: [4,4] }
        },
        ...(showCumulative ? {
          y2: {
            position: 'right',
            ticks: {
              color: '#4af0c8',
              font: { size: 10, family: "'JetBrains Mono', monospace" },
              callback: v => v >= 1e9 ? (v/1e9).toFixed(1)+'B' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v
            },
            grid: { drawOnChartArea: false },
            border: { color: 'rgba(255,255,255,0.08)' }
          }
        } : {})
      }
    }
  });
}

function updateTable(data) {
  const { labels, per, cum } = data;
  document.getElementById('tableBody').innerHTML = labels.map((lv, i) =>
    `<tr><td>${lv}</td><td>${fmt(per[i])}</td><td>${fmt(cum[i])}</td></tr>`
  ).join('');
}

function update() {
  const mn = parseInt(document.getElementById('minNum').value);
  const mx = parseInt(document.getElementById('maxNum').value);
  if (isNaN(mn) || isNaN(mx) || mn < 50 || mx > 999 || mn >= mx) return;
  const data = getData();
  updateStats(data);
  if (activeTab === 'chart') updateChart(data);
  else updateTable(data);
}

function toggleCumulative() {
  showCumulative = !showCumulative;
  const t = document.getElementById('cumToggle');
  const l = document.getElementById('cumLegend');
  t.classList.toggle('on', showCumulative);
  l.style.opacity = showCumulative ? '1' : '0.3';
  update();
}

function nudge(numId, sliderId, delta) {
  const num = document.getElementById(numId);
  const slider = document.getElementById(sliderId);
  let v = parseInt(num.value) + delta;
  num.value = v;
  slider.value = v;
  num.dispatchEvent(new Event('change'));
}

function syncSliderNum(sliderId, numId) {
  const slider = document.getElementById(sliderId);
  const num = document.getElementById(numId);
  const isMin = sliderId === 'minSlider';

  function clamp(v) {
    const other = parseInt(document.getElementById(isMin ? 'maxNum' : 'minNum').value);
    if (isMin) return Math.max(50, Math.min(isNaN(other) ? 999 : other - 1, v));
    else        return Math.min(999, Math.max(isNaN(other) ? 50  : other + 1, v));
  }

  slider.addEventListener('input', () => {
    const v = clamp(parseInt(slider.value));
    slider.value = v; num.value = v;
    // also push the other slider if needed
    const otherSlider = document.getElementById(isMin ? 'maxSlider' : 'minSlider');
    const otherNum   = document.getElementById(isMin ? 'maxNum'   : 'minNum');
    const otherV = parseInt(otherSlider.value);
    if (isMin && otherV <= v) { otherSlider.value = v + 1; otherNum.value = v + 1; }
    if (!isMin && otherV >= v) { otherSlider.value = v - 1; otherNum.value = v - 1; }
    update();
  });

  num.addEventListener('input', () => {
    let v = parseInt(num.value);
    if (isNaN(v)) return;
    v = clamp(v);
    slider.value = v; update();
  });

  num.addEventListener('change', () => {
    let v = parseInt(num.value);
    if (isNaN(v)) v = parseInt(slider.value);
    v = clamp(v);
    num.value = v; slider.value = v; update();
  });
}

function showTab(tab) {
  activeTab = tab;
  document.getElementById('panelChart').style.display = tab === 'chart' ? '' : 'none';
  document.getElementById('panelTable').style.display = tab === 'table' ? '' : 'none';
  document.getElementById('tabChart').className = 'tab-btn' + (tab === 'chart' ? ' active' : '');
  document.getElementById('tabTable').className = 'tab-btn green' + (tab === 'table' ? ' active' : '');
  update();
}

syncSliderNum('minSlider', 'minNum');
syncSliderNum('maxSlider', 'maxNum');
update();
</script>
</body>
</html>
